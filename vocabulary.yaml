schema: "readyroom/standard-vocabulary/v1"
version: "0.3.25"
record_kinds:
  - id: "primitive"
    schema: "readyroom/primitive/v1"
    role: "product_logic_source_record"
    description: "Product-logic source records: premises, intents, standards, and services."
  - id: "flag"
    schema: "readyroom/flag/v1"
    role: "decision_workflow_record"
    description: "Decision/workflow records: decisions, blockers, claim gates, drift, proof gaps, seed work, and change work."
  - id: "artifact"
    schema: "readyroom/artifact/v1"
    role: "evidence_artifact_descriptor"
    description: "Evidence/artifact descriptors for resources, samples, snippets, designs, manifests, and proof corpora."
stage_kinds:
  - id: "normal"
    description: "Buildable product stage."
  - id: "horizon"
    description: "Future product concept shelf, not claimable implementation work."
  - id: "experiment"
    description: "Alternative branch or product plan."
  - id: "archive"
    description: "Historical stage, not default-selectable."
  - id: "template"
    description: "Reusable starter shape."
scope_kinds:
  - id: "stage"
    description: "Records scoped to one stage under ready/stages/<stage-id>."
  - id: "shared"
    description: "Cross-stage product truth under ready/shared that any stage may reference without copying."
primitive_classes:
  - id: "product_logic"
    description: "Durable source product truth: premises, intents, standards, and services."
  - id: "decision_workflow"
    description: "Process state, ambiguity, blockers, claim readiness, proof gaps, seed work, and change work."
  - id: "evidence_artifact"
    description: "Supporting evidence, resources, proof corpora, snippets, designs, manifests, screenshots, and handoff material."
  - id: "governance"
    description: "Authority, process, agent behavior, skills, and templates."
product_logic_types:
  - id: "premise"
    primitive_class: "product_logic"
    id_family: "P-*"
    description: "Why the product, stage, feature, or decision should exist."
  - id: "intent"
    primitive_class: "product_logic"
    id_family: "I-*"
    description: "What the product promises to do or how it should behave."
  - id: "standard"
    primitive_class: "product_logic"
    id_family: "ST-*"
    description: "Constraints, rules, quality bars, compliance needs, measurement rules, and non-negotiable behavior."
  - id: "service"
    primitive_class: "product_logic"
    id_family: "SV-*"
    description: "Dependencies required to build, prove, run, or monitor the product."
product_logic_subtypes:
  premise_type:
    field_path: "fields.premise_type"
    applies_to_type: "premise"
    values:
      - id: "observation"
        label: "Observation"
        description: "Something has been seen in evidence, user behavior, code, research, support, or the market."
      - id: "belief"
        label: "Belief"
        description: "The team is treating something as true based on enough evidence or product-owner judgment."
      - id: "assumption"
        label: "Assumption"
        description: "The next stage relies on something that is not yet proven."
      - id: "need"
        label: "Need"
        description: "A user, buyer, operator, or system actor needs a state or outcome."
      - id: "problem"
        label: "Problem"
        description: "A pain, friction, cost, confusion, failure, or job-to-be-done exists."
      - id: "motivation"
        label: "Motivation"
        description: "An emotional, operational, financial, strategic, or adoption driver explains why the actor cares."
      - id: "risk"
        label: "Risk"
        description: "Something could make the product fail, be rejected, become unsafe, or lose trust."
      - id: "opportunity"
        label: "Opportunity"
        description: "A positive opening exists for the product to create value."
  intent_type:
    field_path: "fields.intent_type"
    applies_to_type: "intent"
    values:
      - id: "promise"
        label: "Promise"
        description: "The record names a product commitment or user-facing outcome."
      - id: "behavior"
        label: "Behavior"
        description: "The record names observable product behavior for a trigger, state, or input."
      - id: "workflow"
        label: "Workflow"
        description: "The record names a multi-step user, operator, system, or agent flow."
      - id: "component"
        label: "Component"
        description: "The record names a coherent product component or bounded set of related behaviors, workflows, capabilities, and surfaces."
      - id: "capability"
        label: "Capability"
        description: "The record names something the product must be able to do."
      - id: "experience"
        label: "Experience"
        description: "The record names user-facing interaction, perception, copy, flow, or design intent."
      - id: "quality"
        label: "Quality"
        description: "The record names a quality-bearing promise that needs an operating envelope."
      - id: "safety"
        label: "Safety"
        description: "The record names prevention, permission, privacy, trust, or harm-reduction behavior."
      - id: "failure"
        label: "Failure"
        description: "The record names what happens when the product cannot fulfill the promise."
flag_types:
  - id: "decision"
    description: "Product-shaping ambiguity that needs an owner decision."
  - id: "discovery"
    description: "Research, clarification, or product-truth discovery work."
  - id: "seed"
    description: "New implementation work that may become claimable when its gate passes."
  - id: "change"
    description: "Modification to existing behavior that may become claimable when its gate passes."
  - id: "blocker"
    description: "A blocked state that prevents other work from proceeding."
  - id: "drift"
    description: "A mismatch between product truth, implementation, artifacts, or generated views."
  - id: "proof_gap"
    description: "Missing or insufficient evidence to close a promise, behavior, or claim."
  - id: "coverage_gap"
    description: "Missing coverage in samples, fixtures, states, proof corpora, or review cases."
artifact_types:
  - id: "customer_statement"
    description: "Direct user, customer, buyer, or operator evidence."
  - id: "source_document"
    description: "Planning docs, specs, notes, briefs, source summaries, or other authored source material."
  - id: "reference_resource"
    description: "Public docs, datasets, schemas, API references, standards, or reusable external resources."
  - id: "access_reference"
    description: "Safe access, credential-location, environment, or setup references."
  - id: "review_protocol"
    description: "Review instructions, rubrics, checklists, or acceptance protocols."
  - id: "proof_corpus"
    description: "Replayable inputs, configs, expected outputs, diagnostics, negative cases, or proof harness references."
  - id: "code_snippet"
    description: "Handoff snippets, component contracts, prototype code, copy blocks, or state maps."
  - id: "design_artifact"
    description: "Mockups, screenshots, diagrams, visual references, prototypes, or design handoff notes."
  - id: "manifest"
    description: "Machine-readable support manifests or indexes."
claim_levels:
  - id: "concept"
    description: "Conceptual product claim without implementation proof."
  - id: "process_proof"
    description: "Process or workflow proof exists, but not fixture or production validation."
  - id: "simulation_baseline"
    description: "Simulation or deterministic baseline exists."
  - id: "fixture_validated"
    description: "Committed fixture proof validates the behavior within its stated authority."
  - id: "human_labeled_validated"
    description: "Human-labeled validation supports the claim."
  - id: "production_monitored"
    description: "Production monitoring supports the claim."
relationship_roles:
  - id: "peer"
    optional_code: 0
    description: "Target is lateral to the current primitive."
  - id: "parent"
    optional_code: 1
    description: "Target is a parent of the current primitive."
  - id: "child"
    optional_code: 2
    description: "Target is a child of the current primitive."
relationship_display:
  - source_type: "intent"
    role: "parent"
    target_type: "premise"
    source_to_target: "serves"
    target_to_source: "served by"
  - source_type: "intent"
    role: "child"
    target_type: "premise"
    source_to_target: "contains"
    target_to_source: "contained by"
  - source_type: "intent"
    role: "child"
    target_type: "intent"
    source_to_target: "fulfilled by"
    target_to_source: "fulfills"
  - source_type: "intent"
    role: "child"
    target_type: "service"
    source_to_target: "requires"
    target_to_source: "required by"
  - source_type: "intent"
    role: "peer"
    target_type: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_type: "intent"
    role: "child"
    target_type: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_type: "premise"
    role: "peer"
    target_type: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_type: "premise"
    role: "child"
    target_type: "intent"
    source_to_target: "served by"
    target_to_source: "serves"
  - source_type: "premise"
    role: "child"
    target_type: "premise"
    source_to_target: "refined by"
    target_to_source: "refines"
  - source_type: "service"
    role: "child"
    target_type: "service"
    source_to_target: "requires"
    target_to_source: "required by"
  - source_type: "service"
    role: "peer"
    target_type: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_type: "service"
    role: "child"
    target_type: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_type: "standard"
    role: "peer"
    target_type: "standard"
    source_to_target: "co-governs with"
    target_to_source: "co-governs with"
  - source_type: "flag"
    role: "peer"
    target_type: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_type: "flag"
    role: "parent"
    target_type: "any_primitive"
    source_to_target: "interrupts"
    target_to_source: "interrupted by"
  - source_type: "artifact"
    role: "child"
    target_type: "artifact"
    source_to_target: "supports"
    target_to_source: "supported by"
  - source_type: "any_primitive"
    role: "peer"
    target_type: "same_or_related_primitive"
    source_to_target: "related to"
    target_to_source: "related to"
rules:
  - "Stored refs use structural roles only: peer, parent, and child."
  - "Semantic relationship display entries must define both source_to_target and target_to_source phrases."
  - "Standards that govern premises, intents, services, flags, or other standards usually use peer refs; child standard refs remain valid fallback semantics for older trees or intentionally nested records."
  - "Constraints are standards, not premise subtypes."
