schema: "ready/standard-vocabulary/v1"
version: "0.3.37"
record_kinds:
  - id: "primitive"
    default_schema: "ready/primitive/v1"
    allowed_schemas:
      - "ready/primitive/v1"
      - "ready/artifact/v1"
    role: "durable_package_input"
    description: "Durable Ready package inputs required to build, prove, operate, or govern the intended product."
  - id: "flag"
    default_schema: "ready/flag/v1"
    allowed_schemas:
      - "ready/flag/v1"
    role: "temporary_workflow_record"
    description: "Temporary package-work records for unresolved Ready-package decisions, proposed changes, blockers, discrepancies, readiness gates, and proof gaps. Complete packages do not retain flags."
  - id: "governance"
    default_schema: "ready/governance/v1"
    allowed_schemas:
      - "ready/governance/v1"
    role: "package_management_record"
    description: "Authority, process, policy, and agent guidance for changing or managing the Ready package."
  - id: "setting"
    default_schema: "ready/setting/v1"
    allowed_schemas:
      - "ready/setting/v1"
    role: "workspace_app_configuration"
    description: "Git-tracked workspace or app configuration for tools that manage the Ready tree."
  - id: "manifest"
    default_schema: "ready/manifest/v1"
    allowed_schemas:
      - "ready/manifest/v1"
      - "ready/product-tree-root/v1"
      - "ready/product-tree-product/v1"
      - "ready/artifact-tree/v1"
      - "ready/governance-tree/v1"
      - "ready/standard-resources/v1"
      - "ready/skill-package/v1"
    role: "structural_metadata"
    description: "Structural package, product, artifact, governance, or settings metadata."
tree_directories:
  - id: "product"
    path: "ready/product"
    description: "Canonical intended product truth for this Ready tree version."
  - id: "flags"
    path: "ready/flags"
    description: "Temporary package-work records for unresolved Ready-package decisions, proposed changes, blockers, discrepancies, readiness gates, and proof gaps."
  - id: "governance"
    path: "ready/governance"
    description: "Project authority, process, and agent behavior."
  - id: "settings"
    path: "ready/settings"
    description: "Git-tracked workspace/app settings for tools that manage the Ready tree."
primitive_classes:
  - id: "premise"
    id_family: "P-*"
    description: "Why the product, feature, or decision should exist."
  - id: "intent"
    id_family: "I-*"
    description: "What the product promises to do or how it should behave."
  - id: "standard"
    id_family: "ST-*"
    description: "Constraints, rules, quality bars, compliance needs, measurement rules, and non-negotiable behavior."
  - id: "service"
    id_family: "SV-*"
    description: "Dependencies required to build, prove, run, or monitor the product."
  - id: "artifact"
    id_family: "A-*"
    description: "Evidence, proof, design, resource, snippet, and package-input descriptors."
primitive_types:
  premise:
    - id: "observation"
      label: "Observation"
      description: "Something has been seen in evidence, user behavior, code, research, support, or the market."
    - id: "belief"
      label: "Belief"
      description: "The team is treating something as true based on enough evidence or product-owner judgment."
    - id: "assumption"
      label: "Assumption"
      description: "The product relies on something that is not yet proven."
    - id: "need"
      label: "Need"
      description: "A user, buyer, operator, or system actor needs a state or outcome."
    - id: "problem"
      label: "Problem"
      description: "A pain, friction, cost, confusion, failure, or job-to-be-done exists."
    - id: "motivation"
      label: "Motivation"
      description: "An emotional, operational, financial, strategic, or adoption driver explains why the actor cares."
    - id: "risk"
      label: "Risk"
      description: "Something could make the product fail, be rejected, become unsafe, or lose trust."
    - id: "opportunity"
      label: "Opportunity"
      description: "A positive opening exists for the product to create value."
  intent:
    - id: "promise"
      label: "Promise"
      description: "The record names a product commitment or user-facing outcome."
    - id: "behavior"
      label: "Behavior"
      description: "The record names observable product behavior for a trigger, state, or input."
    - id: "workflow"
      label: "Workflow"
      description: "The record names a multi-step user, operator, system, or agent flow."
    - id: "module"
      label: "Module"
      description: "The record names a bounded product module that groups related workflows, capabilities, behaviors, surfaces, and proof."
    - id: "component"
      label: "Component"
      description: "The record names a coherent product component or bounded set of related behaviors, workflows, capabilities, and surfaces."
    - id: "capability"
      label: "Capability"
      description: "The record names something the product must be able to do."
    - id: "experience"
      label: "Experience"
      description: "The record names user-facing interaction, perception, copy, flow, or design intent."
    - id: "quality"
      label: "Quality"
      description: "The record names a quality-bearing promise that needs an operating envelope."
    - id: "safety"
      label: "Safety"
      description: "The record names prevention, permission, privacy, trust, or harm-reduction behavior."
    - id: "failure"
      label: "Failure"
      description: "The record names what happens when the product cannot fulfill the promise."
  standard:
    - id: "rule"
      description: "General implementation, behavior, measurement, or maintenance rule."
    - id: "constraint"
      description: "Non-negotiable product, implementation, or operating constraint."
    - id: "quality_bar"
      description: "Quality threshold required for acceptance."
    - id: "compliance"
      description: "Compliance, legal, policy, or regulatory requirement."
    - id: "measurement"
      description: "Measurement, scoring, or evaluation rule."
    - id: "safety"
      description: "Safety, prevention, permission, privacy, trust, or harm-reduction rule."
    - id: "accessibility"
      description: "Accessibility requirement."
    - id: "proof"
      description: "Proof, validation, or evidence requirement."
    - id: "implementation_constraint"
      description: "Build-time or agent-facing implementation constraint needed to compile the package."
  service:
    - id: "platform"
      description: "Hosting, storage, auth, database, or integrated product platform."
    - id: "api"
      description: "External or internal API dependency."
    - id: "data_store"
      description: "Database, object store, vector store, cache, or file storage dependency."
    - id: "model_provider"
      description: "Model, inference, embedding, or agent provider."
    - id: "package"
      description: "Required code package, library, SDK, or runtime package."
    - id: "runtime"
      description: "Runtime, shell, local process, or operating environment."
    - id: "worker"
      description: "Worker, queue, job runner, or background process."
    - id: "deployment"
      description: "Deployment, distribution, signing, or release dependency."
    - id: "external_system"
      description: "External system required to build, prove, run, or monitor the product."
  artifact:
    - id: "customer_statement"
      description: "Direct user, customer, buyer, or operator evidence."
    - id: "source_document"
      description: "Planning docs, specs, notes, briefs, source summaries, or other authored source material."
    - id: "reference_resource"
      description: "Public docs, datasets, schemas, API references, standards, or reusable external resources."
    - id: "access_reference"
      description: "Safe access, credential-location, environment, or setup references."
    - id: "review_protocol"
      description: "Review instructions, rubrics, checklists, or acceptance protocols."
    - id: "proof_corpus"
      description: "Replayable inputs, configs, expected outputs, diagnostics, negative cases, or proof harness references."
    - id: "code_snippet"
      description: "Handoff snippets, component contracts, prototype code, copy blocks, or state maps."
    - id: "design_artifact"
      description: "Mockups, screenshots, diagrams, visual references, prototypes, or design handoff notes."
    - id: "manifest"
      description: "Machine-readable support manifest or index that is itself a durable build/proof input."
flag_classes:
  - id: "decision"
    description: "Unresolved product, design, authority, or process choice that affects Ready-package truth."
  - id: "blocker"
    description: "Something prevents Ready-package completion, proof, or claimability."
  - id: "discrepancy"
    description: "Mismatch between Ready-package truth, implementation, evidence, generated views, or prior commits."
  - id: "readiness"
    description: "Ready-package claim, build, or acceptance gate."
  - id: "proof"
    description: "Missing or insufficient Ready-package proof, coverage, fixture, or validation evidence."
flag_types:
  decision:
    - id: "product_choice"
      description: "Product-shaping ambiguity that needs an owner decision."
    - id: "design_choice"
      description: "Design ambiguity that needs an owner decision."
    - id: "authority_choice"
      description: "Authority, access, or process ambiguity that needs a decision."
  blocker:
    - id: "service_access"
      description: "Service, account, credential, or environment access blocks progress."
    - id: "dependency"
      description: "Required dependency blocks progress."
    - id: "authority"
      description: "Authority or approval blocks progress."
  discrepancy:
    - id: "implementation_drift"
      description: "Implementation differs from Ready-package truth."
    - id: "evidence_drift"
      description: "Evidence differs from Ready-package truth."
    - id: "view_drift"
      description: "Generated or displayed view differs from source truth."
  readiness:
    - id: "seed"
      description: "Accepted Ready-package truth is ready to be built or proven for the first time."
    - id: "change"
      description: "Accepted Ready-package truth has changed and needs build or proof attention."
    - id: "discovery"
      description: "Research, clarification, or product-truth discovery is needed before the package is complete."
  proof:
    - id: "proof_gap"
      description: "Missing or insufficient evidence to close a promise, behavior, or claim."
    - id: "coverage_gap"
      description: "Missing coverage in samples, fixtures, states, proof corpora, or review cases."
    - id: "fixture_gap"
      description: "Missing or insufficient fixture data for proof or regression."
governance_classes:
  - id: "authority"
    description: "Who may define, approve, or change the Ready package."
  - id: "process"
    description: "How the Ready package is changed, reviewed, or released."
  - id: "policy"
    description: "Policy for package management, safety, access, or agent behavior."
  - id: "agent_guideline"
    description: "Agent behavior guidance for editing or interpreting the package."
setting_classes:
  - id: "workspace"
    description: "Tracked workspace configuration for Ready tools."
  - id: "app"
    description: "Tracked app configuration for managing or viewing the Ready tree."
  - id: "agent_context"
    description: "Tracked product-agent context configuration."
manifest_classes:
  - id: "package"
    description: "Ready package metadata."
  - id: "product"
    description: "Product tree metadata."
  - id: "artifact"
    description: "Artifact tree or artifact index metadata."
  - id: "governance"
    description: "Governance tree metadata."
  - id: "settings"
    description: "Settings tree metadata."
record_statuses:
  - id: "ready"
    compile_behavior: "include"
    description: "Resolved for its record kind; product primitives compile as current intended truth. Flags do not use ready status."
  - id: "draft"
    compile_behavior: "warn"
    description: "Incomplete or not yet approved for its record kind; orchestrators may compile only with warning."
  - id: "blocked"
    compile_behavior: "stop_without_override"
    description: "Cannot be built, proven, operated, or claimed without resolving the blocker or receiving explicit override instructions."
status_rules:
  - kind: "flag"
    allowed_statuses:
      - "blocked"
    default_status: "temporary_package_work"
    description: "Flags omit top-level status unless blocked; temporary package-work state is implied by kind: flag."
blocker_rules:
  - id: "non_empty_blocker_list_blocks_record"
    applies_to_kinds:
      - "primitive"
      - "flag"
    blocker_fields:
      - "blocked_by"
      - "fields.blockers"
    required_status: "blocked"
    description: "Any record with a non-empty blocker list must use status: blocked and requires explicit override before implementation."
  - id: "blocker_flag_blocks_package"
    applies_to_kinds:
      - "flag"
    applies_to_classes:
      - "blocker"
    required_status: "blocked"
    required_claimable: false
    description: "Blocker flags use status: blocked, remain non-claimable, and require resolution or explicit override before implementation."
proof_corpus_lifecycle_states:
  - id: "frozen"
    description: "Committed proof corpus is stable and can be used as proof within its stated authority."
  - id: "replaceable"
    description: "Committed proof corpus is usable but expected to be replaced when better proof exists."
  - id: "retired"
    description: "Proof corpus is retained for history or comparison and should not be used as active proof."
compiler_roles:
  - id: "source_truth"
    description: "Canonical product-package truth used by compilers and orchestrators."
  - id: "constraint"
    description: "Rule, standard, or constraint applied to package compilation or implementation."
  - id: "dependency"
    description: "Service or dependency needed to build, prove, run, or monitor the product."
  - id: "evidence"
    description: "Evidence input that supports product-package truth or review."
  - id: "proof_input"
    description: "Replayable proof, fixture, or validation input."
  - id: "design_contract"
    description: "Design or interaction source used for product-faithful implementation."
  - id: "handoff_reference"
    description: "Reference material needed by a human or coding agent during handoff."
  - id: "build_input"
    description: "Durable input needed to build or compile the package."
  - id: "generated_view_input"
    description: "Input used to generate or verify compiled views."
  - id: "review_protocol"
    description: "Review protocol, rubric, or acceptance checklist."
  - id: "workflow_state"
    description: "Temporary package-work state carried by a flag."
  - id: "decision_needed"
    description: "Unresolved package decision carried by a decision flag."
claim_levels:
  - id: "concept"
    description: "Conceptual product claim without implementation proof."
  - id: "process_proof"
    description: "Process or workflow proof exists, but not fixture or production validation."
  - id: "simulation_baseline"
    description: "Simulation or deterministic baseline exists."
  - id: "fixture_validated"
    description: "Committed fixture proof validates the behavior within its stated authority."
  - id: "human_labeled_validated"
    description: "Human-labeled validation supports the claim."
  - id: "production_monitored"
    description: "Production monitoring supports the claim."
relationship_roles:
  - id: "peer"
    optional_code: 0
    description: "Target is lateral to the current record."
  - id: "parent"
    optional_code: 1
    description: "Target is a parent of the current record."
  - id: "child"
    optional_code: 2
    description: "Target is a child of the current record."
relationship_display_wildcards:
  - id: "any"
    description: "Matches any class for the specified kind."
  - id: "same_or_related"
    description: "Matches the same class or a project-approved related class."
relationship_display:
  - source_kind: "primitive"
    source_class: "intent"
    role: "parent"
    target_kind: "primitive"
    target_class: "premise"
    source_to_target: "serves"
    target_to_source: "served by"
  - source_kind: "primitive"
    source_class: "intent"
    role: "child"
    target_kind: "primitive"
    target_class: "premise"
    source_to_target: "refined by"
    target_to_source: "refines"
  - source_kind: "primitive"
    source_class: "intent"
    role: "child"
    target_kind: "primitive"
    target_class: "intent"
    source_to_target: "fulfilled by"
    target_to_source: "fulfills"
  - source_kind: "primitive"
    source_class: "intent"
    role: "peer"
    target_kind: "primitive"
    target_class: "intent"
    source_to_target: "coordinates with"
    target_to_source: "coordinates with"
  - source_kind: "primitive"
    source_class: "artifact"
    role: "peer"
    target_kind: "primitive"
    target_class: "artifact"
    source_to_target: "cites"
    target_to_source: "cited by"
  - source_kind: "primitive"
    source_class: "intent"
    role: "child"
    target_kind: "primitive"
    target_class: "service"
    source_to_target: "requires"
    target_to_source: "required by"
  - source_kind: "primitive"
    source_class: "intent"
    role: "peer"
    target_kind: "primitive"
    target_class: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_kind: "primitive"
    source_class: "intent"
    role: "child"
    target_kind: "primitive"
    target_class: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_kind: "primitive"
    source_class: "premise"
    role: "child"
    target_kind: "primitive"
    target_class: "intent"
    source_to_target: "served by"
    target_to_source: "serves"
  - source_kind: "primitive"
    source_class: "premise"
    role: "child"
    target_kind: "primitive"
    target_class: "premise"
    source_to_target: "refined by"
    target_to_source: "refines"
  - source_kind: "primitive"
    source_class: "service"
    role: "child"
    target_kind: "primitive"
    target_class: "service"
    source_to_target: "requires"
    target_to_source: "required by"
  - source_kind: "primitive"
    source_class: "service"
    role: "peer"
    target_kind: "primitive"
    target_class: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_kind: "primitive"
    source_class: "service"
    role: "child"
    target_kind: "primitive"
    target_class: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_kind: "primitive"
    source_class: "standard"
    role: "peer"
    target_kind: "primitive"
    target_class: "standard"
    source_to_target: "co-governs with"
    target_to_source: "co-governs with"
  - source_kind: "flag"
    role: "peer"
    target_kind: "primitive"
    target_class: "standard"
    source_to_target: "governed by"
    target_to_source: "governs"
  - source_kind: "flag"
    role: "parent"
    target_kind: "primitive"
    target_class: "any"
    source_to_target: "interrupts"
    target_to_source: "interrupted by"
  - source_kind: "primitive"
    source_class: "artifact"
    role: "child"
    target_kind: "primitive"
    target_class: "artifact"
    source_to_target: "supports"
    target_to_source: "supported by"
  - source_kind: "primitive"
    source_class: "any"
    role: "peer"
    target_kind: "primitive"
    target_class: "same_or_related"
    source_to_target: "related to"
    target_to_source: "related to"
rules:
  - "Stored refs use structural roles only: peer, parent, and child."
  - "Semantic relationship display entries must define both source_to_target and target_to_source phrases."
  - "Premises should not reference services or standards directly; attach those refs to the intent that serves the premise."
  - "Subordinate intent-to-intent relationships are authored by the parent intent with child refs; lateral intent-to-intent relationships may use peer refs."
  - "Standards that govern intents, services, flags, or other standards usually use peer refs; child standard refs remain valid fallback semantics for older trees or intentionally nested records."
  - "Artifact-to-artifact refs may be reciprocal only when each directed edge is an independent artifact assertion, not when one edge merely mirrors another for display."
  - "Constraints are standards, not premise subtypes."
