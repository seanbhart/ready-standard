schema: "ready/skill-package/v1"
kind: "manifest"
class: "bundle"
package_id: "ready"
package_name: "Ready Product Leader Skill Bundle"
version: "0.3.40"
entrypoint: "SKILL.md"
package_root: "."
copy_root: "."
description: "Portable Ready Skill entrypoint and task modules for creating product trees that coding agents can build from."
load_order:
  - "SKILL.md"
  - "ready-skill.md"
modules:
  - id: "ready-tree-maintenance"
    path: "modules/ready-tree-maintenance.md"
    load_when: "Existing Ready bundle truth needs updates from product work, coding work, new evidence, implementation drift, drafts, blockers, clarification questions, or create-vs-update decisions."
  - id: "ready-evidence-resource-review"
    path: "modules/evidence-resource-review.md"
    load_when: "Evidence, samples, generated fixtures, public resources, or user-only information are missing or unverified."
  - id: "ready-access-readiness"
    path: "modules/access-readiness.md"
    load_when: "Accounts, credentials, environments, CLI logins, provider sessions, or service setup can block coding."
  - id: "ready-design-artifact-readiness"
    path: "modules/design-artifact-readiness.md"
    load_when: "UI, workflow, copy, visual proof, component contracts, or design handoff can affect implementation."
  - id: "ready-coding-handoff-readiness"
    path: "modules/coding-handoff-readiness.md"
    load_when: "A seed or change flag may become claimable or a coding agent needs a resolved target-state handoff."
  - id: "ready-perspective-review"
    path: "modules/perspective-review.md"
    load_when: "The tree needs psychological, physical, logical, evidence, design, or access challenge review."
  - id: "ready-standard-update"
    path: "modules/standard-update.md"
    load_when: "A product tree must be upgraded to a newer Ready Standard version."
portable_files:
  - "README.md"
  - "manifest.yaml"
  - "SKILL.md"
  - "ready-skill.md"
  - "modules/ready-tree-maintenance.md"
  - "modules/evidence-resource-review.md"
  - "modules/access-readiness.md"
  - "modules/design-artifact-readiness.md"
  - "modules/coding-handoff-readiness.md"
  - "modules/perspective-review.md"
  - "modules/standard-update.md"
worker_output_contract:
  - "findings"
  - "evidence_refs"
  - "proposed_record_updates_or_deferrals"
  - "uncertainty"
  - "user_only_asks"
  - "safe_agent_gatherable_resources"
  - "readiness_recommendation"
  - "standard_update_report"
rules:
  - "The entrypoint routes work; modules provide task procedure."
  - "Copy the bundle as source text, not as a binary archive, unless the receiving project explicitly wants an archive."
  - "For product repos, copy the Ready Standard bundle to ready/standard/."
  - "Do not copy docs/, .git/, or .gitignore into product repos."
  - "Do not copy project-specific secrets, local cache, raw logs, or private raw examples with the skill bundle."
  - "Receiving projects should point ready/manifest.yaml at the copied ready/standard bundle and keep per-run loaded file hashes in untracked runtime context outside the Ready tree."
  - "Valid vocabulary lives in ready/standard/vocabulary.yaml; task modules should reference it instead of repeating value lists."
