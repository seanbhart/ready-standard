schema: "ready/standard-resources/v1"
kind: "manifest"
class: "package"
version: "0.3.37"
standard_root: "."
repository: "https://github.com/seanbhart/ready-standard"
portable_package:
  destination: "ready/standard"
  include:
    - "README.md"
    - "manifest.yaml"
    - "vocabulary.yaml"
    - "skills/"
    - "templates/"
  exclude:
    - ".git/"
    - ".gitignore"
    - "docs/"
resources:
  - id: "RS-000"
    path: "README.md"
    role: "standard_package_readme"
  - id: "RS-001"
    path: "skills/manifest.yaml"
    role: "ready_skill_package_manifest"
  - id: "RS-002"
    path: "skills/SKILL.md"
    role: "ready_skill_entrypoint"
  - id: "RS-002A"
    path: "skills/ready-skill.md"
    role: "ready_skill_authoritative_entrypoint"
  - id: "RS-003"
    path: "templates/README.md"
    role: "template_index"
  - id: "RS-004"
    path: "skills/modules/standard-update.md"
    role: "standard_update_procedure"
  - id: "RS-005"
    path: "vocabulary.yaml"
    role: "canonical_vocabulary"
skill_modules:
  - "skills/modules/evidence-resource-review.md"
  - "skills/modules/access-readiness.md"
  - "skills/modules/design-artifact-readiness.md"
  - "skills/modules/coding-handoff-readiness.md"
  - "skills/modules/perspective-review.md"
  - "skills/modules/standard-update.md"
template_directories:
  governance: "templates/governance"
  manifests: "templates/manifests"
  primitives: "templates/primitives"
rules:
  - "Project-specific governance lives in ready/governance."
  - "Git-tracked workspace and app settings live in ready/settings when a product tree needs them."
  - "Canonical intended product truth for this Ready tree version lives in ready/product."
  - "Temporary package-work records for unresolved Ready-package decisions, proposed changes, version-divergence notes, blockers, discrepancies, readiness gates, and proof gaps live in ready/flags as peer records, not as product truth."
  - "A complete Ready package has no flags and no status-bearing records in draft or blocked."
  - "Orchestrators warn before implementing draft packages and do not implement blocked packages without explicit override instructions."
  - "A Ready branch represents one coherent intended product state; Git branches and history carry alternatives and evolution."
  - "Intent Completion Proof lives on intents; flags may carry closure criteria for temporary package-work records but are not implementation instructions."
  - "Project-agnostic Ready resources and templates live in the Ready Standard package."
  - "Project governance travels with the Ready package so contributors share authority and process versions; it is package-management context, not product runtime implementation truth."
  - "Product agents read a target project's vendored ready/standard package for normal tree edits; the vendored package is the local runtime contract."
  - "Fetching this source repo's latest standard is explicit standard-update work, not normal tree-edit behavior."
  - "The vendored package excludes Mintlify docs and Git metadata; manifests keep docs_source for public reference docs."
  - "Artifact descriptors are primitives with class: artifact; they support product truth and do not store governance or standard resources."
  - "Ready-carried artifact payloads may be copied, transformed, or compiled into the product, but runtime/build product artifacts belong in product-owned paths or storage, not ready/settings."
  - "Subordinate intent-to-intent relationships are authored by the parent intent with child refs; lateral intent-to-intent relationships may use peer refs."
  - "Artifact-to-artifact refs may be reciprocal only when each directed edge is an independent artifact assertion, not when one edge merely mirrors another for display."
  - "Templates must use placeholders for project-specific authority, owners, services, and product directories."
  - "Valid kinds, classes, types, claim levels, and relationship display phrases are centralized in vocabulary.yaml."
