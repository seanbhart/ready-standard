schema: ready/flag/v1
kind: flag
id: "{{X_ID_OR_CLASS_ID}}"
class: "{{blocker|discrepancy|readiness|proof}}"
# Add `status: blocked` and keep `claimable: false` when class is blocker or
# blocked_by is non-empty. Other flags omit status.
# Use templates/flags/decision.ready.template.yml for decision flags because
# they require structured question, safe_default, and proposals fields.
# Valid types are class-scoped:
# blocker: service_access|dependency|authority
# discrepancy: implementation_drift|evidence_drift|view_drift
# readiness: seed|change|discovery
# proof: proof_gap|coverage_gap|fixture_gap
type: "{{TYPE_VALID_FOR_CLASS_FROM_VOCABULARY}}"
compiler_role: workflow_state
title: "{{FLAG_TITLE}}"
claimable: false
blocked_by: []
completion_proof:
  - "{{RECORDED_FLAG_CLOSURE_CRITERION_NOT_PRODUCT_DOD}}"
fields:
  objective: "{{WHAT_NEEDS_TO_BE_RESOLVED_OR_PROVEN}}"
  scope: "{{BUNDLE_TRUTH_OR_CLAIM_SCOPE}}"
  non_scope: "{{WHAT_THIS_FLAG_DOES_NOT_COVER}}"
  dependencies: []
  required_standards: []
  required_services: []
  required_artifacts: []
  setup: []
  acceptance: []
  why_it_matters: "{{WHY_THIS_NEEDS_ATTENTION}}"
  blocker_policy: "{{WHEN_CODING_AGENTS_MAY_OR_MAY_NOT_CLAIM_THIS_WORK}}"
refs: []
artifacts: []
owner_notes: []
