schema: "readyroom/artifact-tree/v1"
artifact_root: "ready/{{MILESTONE_ID}}/artifacts"
artifact_index: "ready/{{MILESTONE_ID}}/artifacts.md"
artifact_types:
  customer_statement:
    id_prefix: "RE"
    directory: "resources/"
    validation: "yaml_parse"
    privacy: "user_provided_customer_statement"
    required_fields:
      - confidence
      - statement
      - speaker_type
      - supports
  source_document:
    id_prefix: "RE"
    directory: "resources/"
    validation: "markdown_json_yaml_or_external_ref"
    privacy: "safe_ref_or_public_resource"
    required_fields:
      - confidence
      - source_kind
  reference_resource:
    id_prefix: "RE"
    directory: "resources/"
    validation: "markdown_json_yaml_or_external_ref"
    privacy: "safe_ref_or_public_resource"
    required_fields:
      - confidence
      - purpose
  access_reference:
    id_prefix: "RE"
    directory: "resources/"
    validation: "yaml_parse"
    privacy: "safe_ref_or_private_ref"
    required_fields:
      - confidence
      - access_scope
  review_protocol:
    id_prefix: "RE"
    directory: "resources/"
    validation: "yaml_parse"
    privacy: "safe_ref_or_public_resource"
    required_fields:
      - confidence
      - protocol_scope
  sample_data:
    id_prefix: "SA"
    directory: "samples/"
    validation: "json_parse"
    privacy: "sanitized_fixture_or_explicit_user_stub"
    required_fields:
      - confidence
      - fixture_scope
  code_snippet:
    id_prefix: "SN"
    directory: "snippets/"
    validation: "markdown_or_text"
    required_fields:
      - confidence
      - snippet_scope
  design_artifact:
    id_prefix: "DA"
    directory: "designs/"
    validation: "external_or_binary_ref"
    required_fields:
      - confidence
      - design_scope
  manifest:
    id_prefix: "MA"
    directory: "manifests/"
    validation: "json_or_yaml_parse"
    required_fields:
      - confidence
      - manifest_scope
rules:
  - "Artifact records are evidence/artifact primitives that support product logic, flags, proof, or generated views."
  - "Large, binary, private, or generated payload files are attachments or safe refs, not necessarily primitive records themselves."
  - "Governing docs and standard resources do not live under artifacts."
