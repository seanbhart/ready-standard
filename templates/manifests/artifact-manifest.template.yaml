schema: "readyroom/artifact-tree/v1"
artifact_root: "{{SCOPE_PATH}}/artifacts"
artifact_index: "{{SCOPE_PATH}}/artifacts.md"
descriptor_required_top_level:
  - schema
  - kind
  - id
  - type
  - title
  - status
descriptor_required_fields:
  - purpose
  - content
  - intended_use
  - format
evidence_or_proof_required_fields:
  - confidence
  - provenance
file_backed_required_file_fields:
  - path
  - role
artifact_types:
  customer_statement:
    id_prefix: "AR"
    directory: "resources/"
    validation: "yaml_parse"
    privacy: "user_provided_customer_statement"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - statement
      - speaker_type
      - supports
  source_document:
    id_prefix: "AR"
    directory: "resources/"
    validation: "markdown_json_yaml_or_external_ref"
    privacy: "safe_ref_or_public_resource"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - source_kind
  reference_resource:
    id_prefix: "AR"
    directory: "resources/"
    validation: "markdown_json_yaml_or_external_ref"
    privacy: "safe_ref_or_public_resource"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
  access_reference:
    id_prefix: "AR"
    directory: "resources/"
    validation: "yaml_parse"
    privacy: "safe_ref_or_private_ref"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - access_scope
  review_protocol:
    id_prefix: "AR"
    directory: "resources/"
    validation: "yaml_parse"
    privacy: "safe_ref_or_public_resource"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - protocol_scope
  proof_corpus:
    id_prefix: "AP"
    directory: "samples/"
    validation: "json_parse"
    privacy: "sanitized_fixture_or_explicit_user_stub"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - proof_role
      - authority_level
      - dataset_contract
      - oracle_policy
      - replay
      - acceptance_contract
  code_snippet:
    id_prefix: "ASN"
    directory: "snippets/"
    validation: "markdown_or_text"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - snippet_scope
  design_artifact:
    id_prefix: "AD"
    directory: "designs/"
    validation: "external_or_binary_ref"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - design_scope
  manifest:
    id_prefix: "AM"
    directory: "manifests/"
    validation: "json_or_yaml_parse"
    required_fields:
      - confidence
      - provenance
      - purpose
      - content
      - intended_use
      - format
      - manifest_scope
rules:
  - "Artifact descriptors are evidence/artifact primitives that support product logic, flags, proof, or generated views."
  - "One descriptor records one artifact purpose; do not bundle files with different purposes into the same descriptor."
  - "A descriptor may list multiple files only when those files are interchangeable versions or representations of the same purpose."
  - "Every referenced non-.ready payload file should be represented by a descriptor."
  - "Large, binary, private, or generated payload files are attachments or safe refs, not primitive records themselves."
  - "Governing docs and standard resources do not live under artifacts."
