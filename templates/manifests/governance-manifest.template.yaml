schema: "ready/governance-tree/v1"
kind: "manifest"
class: "governance"
governance_root: "ready/governance"
documents:
  - id: "GV-001"
    kind: "governance"
    class: "agent_guideline"
    path: "ready/governance/agent-guidelines.md"
    role: "agent_behavior_guidelines"
  - id: "GV-002"
    kind: "governance"
    class: "process"
    path: "ready/governance/product-orchestrator-charter.md"
    role: "product_orchestrator_charter"
  - id: "GV-003"
    kind: "governance"
    class: "process"
    path: "ready/governance/product-process.md"
    role: "source_product_process"
  - id: "GV-004"
    kind: "governance"
    class: "authority"
    path: "ready/governance/workspace-authority-and-access.md"
    role: "workspace_authority_policy_seed"
rules:
  - "Project-specific governance documents are governance records: bundle-management records that constrain authority, process, and agent behavior."
  - "Reusable Ready Standard resources live in the Ready Standard bundle rather than ready/governance."
  - "Governance documents are not artifacts."
