schema: "readyroom/product-tree/v1"
product: "{{PRODUCT_ID}}"
milestone: "{{MILESTONE_ID}}"
stage:
  id: "{{MILESTONE_ID}}"
  title: "{{MILESTONE_TITLE}}"
  kind: "normal"
  status: "active"
  order: 10
  default_candidate: true
  coding_claims_enabled: false
source_model: "file_per_record_ready_yaml"
source_root: "ready/{{MILESTONE_ID}}"
governance_docs:
  root: "../governance/"
  agent_guidelines: "../governance/agent-guidelines.md"
  product_orchestrator_charter: "../governance/product-orchestrator-charter.md"
  product_process: "../governance/product-process.md"
  workspace_authority_and_access: "../governance/workspace-authority-and-access.md"
ready_standard:
  version: "0.3.5"
  repository: "https://github.com/seanbhart/ready-standard"
  package_path: "../standard"
  package_manifest: "../standard/manifest.yaml"
  docs_source: "https://github.com/seanbhart/ready-standard/tree/0.3.5/docs"
primitive_directories:
  premises: "premises/"
  intents: "intents/"
  standards: "standards/"
  services: "services/"
primitive_classes:
  product_logic:
    directories:
      premises: "premises/"
      intents: "intents/"
      standards: "standards/"
      services: "services/"
  decision_workflow:
    directories:
      questions: "flags/discovery/"
      seed_flags: "flags/seed/"
      delta_flags: "flags/delta/"
      discovery_flags: "flags/discovery/"
  evidence_artifact:
    directories:
      samples: "artifacts/samples/"
      resources: "artifacts/resources/"
      snippets: "artifacts/snippets/"
      designs: "artifacts/designs/"
      manifests: "artifacts/manifests/"
  governance:
    directories:
      governance: "../governance/"
flag_directories:
  seed: "flags/seed/"
  delta: "flags/delta/"
  discovery: "flags/discovery/"
question_directories:
  open: "flags/discovery/"
artifact_directories:
  index: "artifacts.md"
  manifest: "artifacts/manifest.yaml"
  samples: "artifacts/samples/"
  resources: "artifacts/resources/"
  snippets: "artifacts/snippets/"
  designs: "artifacts/designs/"
  manifests: "artifacts/manifests/"
